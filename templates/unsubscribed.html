<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam Trader</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: #0e0e10;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #efeff1;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .box {
            text-align: center;
            max-width: 400px;
            padding: 2rem;
        }
        h1 { font-size: 1.5rem; margin-bottom: 1rem; }
        p { color: #adadb8; font-size: 0.9375rem; line-height: 1.6; }
        a { color: #6d5bba; text-decoration: none; }
    </style>
</head>
<body>
    <div class="box">
        {% if success %}
            <h1>{{ i.unsub_title_success }}</h1>
            <p>{{ i.unsub_body_success }}</p>
        {% else %}
            <h1>{{ i.unsub_title_fail }}</h1>
            <p>{{ i.unsub_body_fail }}</p>
        {% endif %}
        <p style="margin-top: 2rem;"><a href="/">{{ i.unsub_back_home }}</a></p>
    </div>
</body>
</html>
